<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PANISSE · Tarjeta de mesa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Outfit:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --navy:#041b31; --gold:#b28f4c; --gold-soft:#d9bb73; --paper:#f6f6f5; --ink-soft:#47535e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#e8e8e6; font-family:'Outfit',system-ui,sans-serif; color:var(--navy);
         display:flex; flex-direction:column; align-items:center; gap:16px; padding:28px 16px; }
  .toolbar { text-align:center; color:var(--ink-soft); font-size:13px; line-height:1.5; }
  .toolbar button { font:inherit; font-weight:500; cursor:pointer; margin-top:8px;
    background:var(--navy); color:var(--gold-soft); border:none; padding:10px 22px; border-radius:2px; }

  .card {
    width:340px; background:var(--paper); border:1px solid var(--gold-soft);
    outline:1px solid rgba(178,143,76,.4); outline-offset:5px;
    padding:34px 30px 30px; text-align:center;
    box-shadow:0 10px 30px rgba(4,27,49,.12);
  }
  .kicker { font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold); }
  .brand { font-family:'Playfair Display',serif; font-weight:600; font-size:40px; letter-spacing:.16em;
           color:var(--navy); margin:8px 0 2px; }
  .tag { font-family:'Playfair Display',serif; font-style:italic; font-size:14px; color:var(--ink-soft); }
  .rule { display:flex; align-items:center; gap:10px; margin:18px 0; }
  .rule::before, .rule::after { content:""; flex:1; height:1px; background:var(--gold-soft); }
  .rule span { color:var(--gold); font-size:11px; }
  .qr { width:210px; height:210px; margin:0 auto; padding:12px; background:#fff; border:1px solid var(--gold-soft); }
  .qr svg { width:100%; height:100%; display:block; }
  .cta { font-family:'Playfair Display',serif; font-size:19px; color:var(--navy); margin-top:18px; }
  .steps { font-size:12.5px; color:var(--ink-soft); line-height:1.7; margin-top:6px; }
  .url { margin-top:14px; font-size:11px; letter-spacing:.04em; color:var(--gold); }

  @media print {
    body { background:#fff; padding:0; }
    .toolbar { display:none; }
    .card { box-shadow:none; margin:40px auto; page-break-inside:avoid; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    Tarjeta lista para imprimir y poner en las mesas.
    <br /><button onclick="window.print()">Imprimir</button>
  </div>

  <div class="card">
    <p class="kicker">Ristorante · Caffè</p>
    <h1 class="brand">PANISSE</h1>
    <p class="tag">Cocina italiana en Pereira</p>

    <div class="rule"><span>❦</span></div>

    </div>

    <p class="cta">Escanea para ver el menú</p>
    <p class="steps">Abre la cámara de tu celular<br />y apúntala al código</p>
    <p class="url">panisse.netlify.app</p>
  </div>
</body>
</html>
